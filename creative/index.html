<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>1P Brand Lift - POC</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="ad" role="application" aria-label="Mini questionnaire">
      <header class="header">
        <div class="brand">Brand Lift</div>
        <button class="cta-link" type="button" id="ctaClick">Learn More</button>
      </header>

      <main class="content">
        <h1 class="title">3 quick questions</h1>
        <p class="subtitle">Answer in a few seconds.</p>

      <form id="surveyForm" class="form" autocomplete="off">
        <!-- Q1 Free text -->
        <div class="field">
          <label for="q1" class="label">
            1) What is your favorite streaming platform ?
          </label>
          <input
            id="q1"
            name="q1"
            type="text"
            class="input"
            maxlength="120"
            placeholder="Enter your preferred streaming platform"
          />
        </div>

        <!-- Q2 Multi-select -->
        <div class="field">
          <label class="label">
            2) Which streaming platform are you using?
          </label>

          <div class="options">
            <label><input type="checkbox" name="q2" value="Netflix"> Netflix</label>
            <label><input type="checkbox" name="q2" value="Prime Video"> Prime Video</label>
            <label><input type="checkbox" name="q2" value="Disney"> Disney+</label>
            <label><input type="checkbox" name="q2" value="HBO Max"> HBO Max</label>
            <label><input type="checkbox" name="q2" value="Apple TV"> Apple TV</label>
            <label><input type="checkbox" name="q2" value="Paramount"> Paramount+</label>
          </div>
        </div>

        <!-- Q3 Single select -->
        <div class="field">
          <label class="label">
            3) Which serie are you likely to watch next time?
          </label>

          <div class="options">
            <label><input type="radio" name="q3" value="The-Night-Agent"> The Night Agent</label>
            <label><input type="radio" name="q3" value="Hijack"> Hijack</label>
            <label><input type="radio" name="q3" value="Fallout"> Fallout</label>
            <label><input type="radio" name="q3" value="Other"> Other</label>
          </div>
        </div>



        <div class="actions">
          <button id="sendBtn" class="btn" type="submit">Send</button>
          <div id="status" class="status" aria-live="polite"></div>
        </div>

        <p class="fineprint">By sending, your answers are stored anonymously.</p>
      </form>


        <div id="thankYou" class="thankyou" hidden>
          <div class="check">✓</div>
          <div class="thanks-title">Thank You !</div>
          <div class="thanks-subtitle">Your answers have been sent successfully.</div>
        </div>
      </main>

      <footer class="footer">
        <span class="hint">Hint : press Enter to submit</span>
      </footer>
    </div>

    <script src="main.js"></script>
  </body>
</html>
